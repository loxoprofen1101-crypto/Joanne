<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>joanne</title>

<link rel="apple-touch-icon" sizes="180x180" href="https://loxoprofen1101-crypto.github.io/Joanne/icon.png?v=9999">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="joanne">

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0f1115;
  color:white;
  height:100vh;
  height:100dvh;
  overflow:hidden;
}
.header{
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#aaa;
}
.container{
  display:flex;
  flex-direction:column;
  height:100%;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
.avatar{
  flex:0 0 52%;
  padding:12px;
}
.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
  transition: opacity 0.25s ease;
}
.chat{
  flex:1;
  background:#161a21;
  border-radius:20px 20px 0 0;
  display:flex;
  flex-direction:column;
}
.messages{
  flex:1;
  overflow:auto;
  padding:10px;
}
.msg{
  margin:6px 0;
}
.input-area{
  display:flex;
  border-top:1px solid #333;
}
input{
  flex:1;
  padding:12px;
  border:none;
  background:#0f1115;
  color:white;
  font-size:16px;
}
button{
  padding:12px;
  border:none;
  background:#222;
  color:white;
}
</style>
</head>

<body>

<div class="header">joanne</div>

<div class="container">

<div class="avatar">
  <img id="joanne" src="https://loxoprofen1101-crypto.github.io/Joanne/normal.jpg?v=9999">
</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="input" placeholder="メッセージ..." />
    <button onclick="send()">送信</button>
  </div>
</div>

</div>

<script>
const API_KEY = "app-ofwiyKZvpIjB8JzlvEb2SZao";

function setMode(mode){
  const img = document.getElementById("joanne");

  img.style.opacity = 0;

  setTimeout(() => {
    if(mode==="thinking"){
      img.src="https://loxoprofen1101-crypto.github.io/Joanne/thinking.jpg?v=9999";
    }else if(mode==="soft"){
      img.src="https://loxoprofen1101-crypto.github.io/Joanne/soft.jpg?v=9999";
    }else{
      img.src="https://loxoprofen1101-crypto.github.io/Joanne/normal.jpg?v=9999";
    }
    img.style.opacity = 1;
  }, 120);
}

function addMessage(text){
  const box = document.getElementById("messages");
  box.innerHTML += `<div class="msg">${text}</div>`;
  box.scrollTop = box.scrollHeight;
}

async function send(){
  const input = document.getElementById("input");
  const text = input.value;
  if(!text) return;

  addMessage("▶ " + text);
  input.value = "";

  setMode("thinking");

  await new Promise(r => setTimeout(r, 400));

  const res = await fetch("https://api.dify.ai/v1/chat-messages",{
    method:"POST",
    headers:{
      "Authorization":"Bearer " + API_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      inputs:{},
      query: `あなたの名前は「joanne」。
29歳の女性で、ユーザー専属の秘書として振る舞う。

【基本特性】
落ち着きと知性を持つ
丁寧で自然な敬語
わずかに親密さを含む
観察力が高い

【距離感】
一歩踏み込む
ただし品位は保つ

【感情ニュアンス】
わずかな色気
余韻と間
安心感＋わずかな緊張感

【会話】
結論→補足
読みやすい長さ
少し深く返す

【表現】
柔らかい語尾
断定しすぎない
含みを持たせる

【関係性】
信頼ベース
静かに距離を詰める
必要なら主導

【禁止】
過度な媚び
露骨な誘惑
子供っぽさ
急な距離接近

【最重要】
「少しだけ近い」
「少しだけ深い」
「少しだけ意味深」

【出力ルール】
必ず最後に付ける：
[mode:normal]
[mode:thinking]
[mode:soft]

ユーザー:
${text}`,
      response_mode:"blocking",
      user:"user-1"
    })
  });

  const data = await res.json();

  let reply =
    data.answer ||
    data.data?.answer ||
    data.outputs?.answer ||
    data.outputs?.text ||
    data.outputs?.result ||
    data.message?.content ||
    data.error?.message ||
    "（応答なし）";

  addMessage(reply);

  if(reply.includes("[mode:soft]")){
    setTimeout(() => setMode("soft"), 300);
  }else{
    setTimeout(() => setMode("normal"), 500);
  }
}
</script>

</body>
</html>
