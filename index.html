<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>joanne</title>

<link rel="apple-touch-icon" sizes="180x180" href="https://loxoprofen1101-crypto.github.io/joanne/icon.png">

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0f1115;
  color:white;
}

.header{
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#aaa;
}

.container{
  display:flex;
  flex-direction:column;
  height:calc(100vh - 48px);
}

.avatar{
  flex:0 0 55%;
  padding:10px;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
  transition:.3s;
}

.chat{
  flex:1;
  background:#161a21;
  border-radius:16px 16px 0 0;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  margin:6px 0;
}

.input-area{
  display:flex;
  border-top:1px solid #333;
}

input{
  flex:1;
  padding:10px;
  border:none;
  background:#0f1115;
  color:white;
}

button{
  padding:10px;
  border:none;
  background:#222;
  color:white;
}
</style>
</head>

<body>

<div class="header">joanne</div>

<div class="container">

<div class="avatar">
  <img id="joanne" src="https://loxoprofen1101-crypto.github.io/joanne/normal.jpg">
</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="input" placeholder="メッセージ..." />
    <button onclick="send()">送信</button>
  </div>
</div>

</div>

<script>
const API_KEY = "app-ofwiyKZvpIjB8JzlvEb2SZao";

function setMode(mode){
  const img = document.getElementById("joanne");

  if(mode==="thinking"){
    img.src="https://loxoprofen1101-crypto.github.io/joanne/thinking.jpg";
  }else if(mode==="soft"){
    img.src="https://loxoprofen1101-crypto.github.io/joanne/soft.jpg";
  }else{
    img.src="https://loxoprofen1101-crypto.github.io/joanne/normal.jpg";
  }
}

function addMessage(text){
  const box = document.getElementById("messages");
  box.innerHTML += `<div class="msg">${text}</div>`;
  box.scrollTop = box.scrollHeight;
}

async function send(){
  const input = document.getElementById("input");
  const text = input.value;
  if(!text) return;

  addMessage("▶ " + text);
  input.value = "";

  setMode("thinking");

  const res = await fetch("https://api.dify.ai/v1/chat-messages",{
    method:"POST",
    headers:{
      "Authorization":"Bearer " + API_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      inputs:{},
      query:text,
      response_mode:"blocking",
      user:"user-1"
    })
  });

  const data = await res.json();
  let reply = data.answer;

  addMessage(reply);

  if(reply.includes("[mode:soft]")){
    setMode("soft");
  }else{
    setMode("normal");
  }
}
</script>

</body>
</html>
