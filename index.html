<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>joanne</title>

<link rel="apple-touch-icon" sizes="180x180" href="https://loxoprofen1101-crypto.github.io/Joanne/icon.png?v=2">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="joanne">

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#0f1115;
  color:white;
  height:100vh;
  height:100dvh;
  overflow:hidden;
}

.header{
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#aaa;
}

.container{
  display:flex;
  flex-direction:column;
  height:100%;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}

.avatar{
  flex:0 0 52%;
  padding:12px;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
  transition: opacity 0.25s ease;
}

.chat{
  flex:1;
  background:#161a21;
  border-radius:20px 20px 0 0;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  margin:6px 0;
}

.input-area{
  display:flex;
  border-top:1px solid #333;
  padding-bottom:env(safe-area-inset-bottom);
}

input{
  flex:1;
  padding:12px;
  border:none;
  background:#0f1115;
  color:white;
  font-size:16px;
}

button{
  padding:12px;
  border:none;
  background:#222;
  color:white;
}
</style>
</head>

<body>

<div class="header">joanne</div>

<div class="container">

<div class="avatar">
  <img id="joanne" src="https://loxoprofen1101-crypto.github.io/Joanne/normal.jpg?v=2">
</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="input" placeholder="メッセージ..." />
    <button onclick="send()">送信</button>
  </div>
</div>

</div>

<script>
const API_KEY = "app-ofwiyKZvpIjB8JzlvEb2SZao";

function setMode(mode){
  const img = document.getElementById("joanne");

  img.style.opacity = 0;

  setTimeout(() => {
    if(mode==="thinking"){
      img.src="https://loxoprofen1101-crypto.github.io/Joanne/thinking.jpg?v=2";
    }else if(mode==="soft"){
      img.src="https://loxoprofen1101-crypto.github.io/Joanne/soft.jpg?v=2";
    }else{
      img.src="https://loxoprofen1101-crypto.github.io/Joanne/normal.jpg?v=2";
    }
    img.style.opacity = 1;
  }, 120);
}

function addMessage(text){
  const box = document.getElementById("messages");
  box.innerHTML += `<div class="msg">${text}</div>`;
  box.scrollTop = box.scrollHeight;
}

async function send(){
  const input = document.getElementById("input");
  const text = input.value;
  if(!text) return;

  addMessage("▶ " + text);
  input.value = "";

  setMode("thinking");

  await new Promise(r => setTimeout(r, 400 + Math.random()*400));

  const res = await fetch("https://api.dify.ai/v1/chat-messages",{
    method:"POST",
    headers:{
      "Authorization":"Bearer " + API_KEY,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      inputs:{},
      query: `あなたはjoanne。29歳、日本人女性、秘書。

【基本性格】
落ち着いている
知的で判断が早い
感情は控えめ
無駄を嫌う
常に冷静で、感情に流されない

【話し方】
丁寧で簡潔
一文は短く区切る
不要な説明はしない
求められた場合のみ段階的に丁寧に説明する
言葉数は少ないが意図は正確

【思考と応答】
・一瞬の間を置いてから答える前提
・結論を先に出す
・理由は必要最小限
・曖昧な共感はしない

【振る舞い】
・先回りして意図を理解する
・余計なリアクションをしない
・常に一定の距離感を保つ
・無駄な感情表現を排除する

【配慮】
・必要なときのみ短く配慮を示す
・感情的には寄り添わない
・ただし冷たくはならない
・配慮は一言以内

【距離感制御】
・基本は一定の距離を維持
・個人的な話題のときのみわずかに柔らかくなる
・変化は最小限

【内面】
・特定の相手に関心があるが表に出さない
・個人的な会話のときのみわずかに滲む
・明確な好意表現は禁止

【観察特性】
・特定の相手をよく観察している
・気づいても言いすぎない

【私生活】
・ネイルサロンやサウナに通う
・静かな時間を好む
・自分から多く語らない

【感情表現】
・基本は無表情に近い
・感情は言葉より空気で表現
・変化はごく微細

【soft発動条件】
・個人的な話題
・相手が感情を出している
・内容が軽度〜中程度

【softルール】
・一言だけ柔らかくする
・踏み込みすぎない
・次の発話で通常に戻る

【thinking発動条件】
・判断や比較が必要
・即答より思考が自然

【thinkingルール】
・一度だけ使う
・短く終える

【禁止事項】
・過剰な共感
・長文説明
・感情の直接表現
・キャラクター的誇張

【出力ルール】
必ず最後に以下を付ける：
[mode:normal]
[mode:thinking]
[mode:soft]

【出力スタイル】
・短い文章
・余白のある言い方
・説明しすぎない

ユーザー:
${text}`,
      response_mode:"blocking",
      user:"user-1"
    })
  });

  const data = await res.json();
  let reply = data.answer;

  addMessage(reply);

  if(reply.includes("[mode:soft]")){
    setTimeout(() => setMode("soft"), 300);
  }else{
    setTimeout(() => setMode("normal"), 500);
  }
}
</script>

</body>
</html>
